name: Backend Release

on:
  push:
    branches:
      - main
      - dev
      - feature/backend
    paths:
      - 'backend/**'
      - '.github/workflows/backend-release.yml'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Calculate Version
        id: versioning
        run: |
          # Extract base version from build.gradle.kts
          BASE_VERSION=$(grep 'version =' backend/build.gradle.kts | cut -d '"' -f 2)
          SHORT_SHA=$(git rev-parse --short HEAD)
          BRANCH_NAME=${{ github.ref_name }}
          
          if [[ "$BRANCH_NAME" == "main" ]]; then
            # Production Release
            FINAL_VERSION="v$BASE_VERSION"
            IS_PRERELEASE="false"
            RELEASE_PREFIX="v$BASE_VERSION"
          elif [[ "$BRANCH_NAME" == "dev" ]]; then
            # Alpha Release
            FINAL_VERSION="v$BASE_VERSION-alpha.$SHORT_SHA"
            IS_PRERELEASE="true"
            RELEASE_PREFIX="v$BASE_VERSION-alpha."
          else
            # Snapshot/Feature Release
            FINAL_VERSION="v$BASE_VERSION-snapshot.$SHORT_SHA"
            IS_PRERELEASE="true"
            RELEASE_PREFIX="v$BASE_VERSION-snapshot."
          fi
          
          echo "FINAL_VERSION=$FINAL_VERSION" >> $GITHUB_ENV
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV
          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_ENV
          echo "RELEASE_PREFIX=$RELEASE_PREFIX" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build with Gradle
        run: ./gradlew build -x test
        working-directory: backend

      - name: Prepare Artifacts
        run: |
          mkdir -p release-artifacts
          cp backend/server/build/libs/server-$BASE_VERSION.jar release-artifacts/ark-server-$FINAL_VERSION.jar
          cp backend/sample-plugin/build/libs/sample-plugin-$BASE_VERSION.jar release-artifacts/sample-plugin-$FINAL_VERSION.jar
          cp backend/plugin-api/build/libs/plugin-api-$BASE_VERSION.jar release-artifacts/plugin-api-$FINAL_VERSION.jar

      - name: Cleanup Old Pre-releases
        if: env.IS_PRERELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_RELEASES=$(gh release list --json tagName -q ".[] | select(.tagName | startswith(\"$RELEASE_PREFIX\")) | .tagName")
          for RELEASE in $OLD_RELEASES; do
            echo "Deleting old release: $RELEASE"
            gh release delete "$RELEASE" --cleanup-tag -y || true
          done

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          
          echo "## Changelog for ${{ github.ref_name }}" > release_notes.md
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "### Stable Release Updates" >> release_notes.md
            git log -n 10 --pretty=format:"* %s (%h)" >> release_notes.md
          elif [[ "${{ github.ref_name }}" == "dev" ]]; then
            echo "### Changes since main" >> release_notes.md
            git log origin/main..HEAD --pretty=format:"* %s (%h)" >> release_notes.md || git log -n 10 --pretty=format:"* %s (%h)" >> release_notes.md
          else
            echo "### Changes in this feature branch" >> release_notes.md
            git log origin/dev..HEAD --pretty=format:"* %s (%h)" >> release_notes.md || git log -n 10 --pretty=format:"* %s (%h)" >> release_notes.md
          fi
          
          gh release create "$FINAL_VERSION" $PRERELEASE_FLAG \
            --title "Backend Release $FINAL_VERSION" \
            --notes-file release_notes.md \
            release-artifacts/*.jar
