name: Backend CI/CD

on:
  push:
    branches:
      - main
      - dev
      - feature/backend
    paths:
      - 'backend/**'
      - '.github/workflows/backend-cicd.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/ark-backend

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-release-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Calculate version and image tags
        env:
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BASE_VERSION=$(grep 'version =' backend/build.gradle.kts | cut -d '"' -f 2)
          if [[ -z "$BASE_VERSION" ]]; then
            echo "ERROR: Could not parse BASE_VERSION from backend/build.gradle.kts" >&2
            exit 1
          fi
          SHORT_SHA=$(git rev-parse --short HEAD)

          if [[ "$BRANCH" == "main" ]]; then
            FINAL_VERSION="v$BASE_VERSION"
            IS_PRERELEASE="false"
            RELEASE_PREFIX="v$BASE_VERSION"
            STABLE_TAG="latest"
          elif [[ "$BRANCH" == "dev" ]]; then
            FINAL_VERSION="v$BASE_VERSION-alpha.$SHORT_SHA"
            IS_PRERELEASE="true"
            RELEASE_PREFIX="v$BASE_VERSION-alpha."
            STABLE_TAG="dev"
          else
            FINAL_VERSION="v$BASE_VERSION-snapshot.$SHORT_SHA"
            IS_PRERELEASE="true"
            RELEASE_PREFIX="v$BASE_VERSION-snapshot."
            STABLE_TAG="snapshot"
          fi

          echo "BASE_VERSION=$BASE_VERSION" >> $GITHUB_ENV
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV
          echo "FINAL_VERSION=$FINAL_VERSION" >> $GITHUB_ENV
          echo "IS_PRERELEASE=$IS_PRERELEASE" >> $GITHUB_ENV
          echo "RELEASE_PREFIX=$RELEASE_PREFIX" >> $GITHUB_ENV
          echo "STABLE_TAG=$STABLE_TAG" >> $GITHUB_ENV

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        working-directory: backend

      - name: Build with Gradle
        run: ./gradlew :server:bootJar -x test --no-daemon
        working-directory: backend

      - name: Prepare release artifact
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          cp backend/server/build/libs/server-$BASE_VERSION.jar release-artifacts/ark-server-$FINAL_VERSION.jar

      - name: Log in to GHCR
        if: env.STABLE_TAG == 'latest'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: env.STABLE_TAG == 'latest'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.FINAL_VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Cleanup old pre-releases
        if: env.IS_PRERELEASE == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          OLD_RELEASES=$(gh release list --json tagName -q ".[] | select(.tagName | startswith(\"$RELEASE_PREFIX\")) | .tagName")
          while IFS= read -r RELEASE; do
            [[ -z "$RELEASE" ]] && continue
            echo "Deleting old release: $RELEASE"
            gh release delete "$RELEASE" --cleanup-tag -y \
              || echo "WARNING: failed to delete release '$RELEASE' — check token permissions and rate limits" >&2
          done <<< "$OLD_RELEASES"

      - name: Generate release notes
        run: |
          set -euo pipefail
          echo "## Changelog for $BRANCH" > release_notes.md
          if [[ "$BRANCH" == "main" ]]; then
            echo "### Stable Release Updates" >> release_notes.md
            git log -n 10 --pretty=format:"* %s (%h)" >> release_notes.md
          elif [[ "$BRANCH" == "dev" ]]; then
            echo "### Changes since main" >> release_notes.md
            git log origin/main..HEAD --pretty=format:"* %s (%h)" >> release_notes.md \
              || { echo "WARNING: Could not diff against origin/main, falling back to last 10 commits" >&2
                   git log -n 10 --pretty=format:"* %s (%h)" >> release_notes.md; }
          else
            echo "### Changes in this feature branch" >> release_notes.md
            git log origin/dev..HEAD --pretty=format:"* %s (%h)" >> release_notes.md \
              || { echo "WARNING: Could not diff against origin/dev, falling back to last 10 commits" >&2
                   git log -n 10 --pretty=format:"* %s (%h)" >> release_notes.md; }
          fi

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PRERELEASE_FLAG=""
          if [[ "$IS_PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$FINAL_VERSION" $PRERELEASE_FLAG \
            --title "Backend Release $FINAL_VERSION" \
            --notes-file release_notes.md \
            release-artifacts/*.jar
