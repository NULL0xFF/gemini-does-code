services:
  db:
    image: mariadb:11
    container_name: ark-db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/${GITHUB_USERNAME}/ark-backend:latest
    container_name: ark-backend
    restart: always
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # Uses the springdoc JSON endpoint which is always available after startup
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/docs-json > /dev/null 2>&1 || exit 1"]
      start_period: 45s
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    image: ghcr.io/${GITHUB_USERNAME}/ark-frontend:latest
    container_name: ark-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      # Requires prior `docker login ghcr.io` on the host to pull private images
      - ~/.docker/config.json:/config.json:ro
    command: --interval 60 --cleanup ark-frontend ark-backend

volumes:
  db-data:
